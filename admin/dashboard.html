<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | HAM Software Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- <link rel="icon" href="assets/image/logo.png" type="image/png"> -->


  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      height: 100vh;
      background: linear-gradient(180deg, #0d6efd, #6610f2);
      color: #fff;
      padding: 1.5rem 1rem;
      position: fixed;
      width: 240px;
    }

    .sidebar h4 {
      font-weight: 600;
      margin-bottom: 2rem;
      text-align: center;
    }

    .sidebar a {
      display: block;
      padding: 0.7rem 1rem;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 0.4rem;
      transition: 0.3s;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(255,255,255,0.2);
    }

    /* Main Content */
    .main {
      margin-left: 240px;
      padding: 2rem;
    }

    /* Top bar */
    .topbar {
      background: #fff;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logout-btn {
      background: #dc3545;
      border: none;
      color: #fff;
      padding: 0.45rem 1.1rem;
      border-radius: 8px;
    }

    /* Stats Cards */
    .stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 10px 20px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .stat-icon {
      font-size: 2rem;
      padding: 1rem;
      border-radius: 12px;
      background: #0d6efd;
      color: #fff;
    }

    /* Messages */
    .message-card {
      background: #fff;
      border-radius: 14px;
      padding: 1.3rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .message-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 28px rgba(0,0,0,0.12);
    }

    .message-card h6 {
      font-weight: 600;
      color: #0d6efd;
    }

    .message-card small {
      color: #6c757d;
    }

    .search-box {
      max-width: 300px;
    }

    @media(max-width: 992px) {
      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }
      .main {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>HAM Admin</h4>
  <a class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a><i class="bi bi-envelope"></i> Messages</a>
  <a><i class="bi bi-gear"></i> Settings</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOP BAR -->
  <div class="topbar">
    <h5 class="mb-0">Admin Dashboard</h5>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-icon"><i class="bi bi-envelope"></i></div>
        <div>
          <h6>Total Messages</h6>
          <h4 id="totalMessages">0</h4>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-icon"><i class="bi bi-person-check"></i></div>
        <div>
          <h6>Clients</h6>
          <h4>—</h4>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-icon"><i class="bi bi-graph-up"></i></div>
        <div>
          <h6>Status</h6>
          <h4>Active</h4>
        </div>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <input type="text" id="search" class="form-control search-box mb-3" placeholder="Search messages...">

  <!-- MESSAGES -->
  <div class="row g-4" id="messages">
    <p class="text-muted">Loading messages...</p>
  </div>

</div>

<script>
  const token = localStorage.getItem("adminToken");
  if (!token) location.href = "login.html";

  let allMessages = [];

  async function loadMessages() {
    const res = await fetch("http://localhost:5000/api/admin/messages", {
      headers: { Authorization: token }
    });

    if (res.status === 401) return logout();

    const data = await res.json();
    allMessages = data;
    document.getElementById("totalMessages").innerText = data.length;
    renderMessages(data);
  }

  function renderMessages(data) {
    const container = document.getElementById("messages");

    if (!data.length) {
      container.innerHTML = `<p class="text-muted">No messages found</p>`;
      return;
    }

    container.innerHTML = data.map(m => `
      <div class="col-md-6 col-lg-4">
        <div class="message-card">
          <h6>${m.name}</h6>
          <p><b>Email:</b> ${m.email}</p>
          <p>${m.message}</p>
          <small>${new Date(m.createdAt).toLocaleString()}</small>
        </div>
      </div>
    `).join("");
  }

  document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase();
    renderMessages(allMessages.filter(m =>
      m.name.toLowerCase().includes(q) ||
      m.email.toLowerCase().includes(q) ||
      m.message.toLowerCase().includes(q)
    ));
  });

  function logout() {
    localStorage.removeItem("adminToken");
    location.href = "login.html";
  }

  loadMessages();
</script>

</body>
</html>
