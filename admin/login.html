<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login | HAM Software Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 15px;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .login-card img {
      max-width: 120px;
    }

    .login-card h3 {
      font-weight: 600;
    }

    .error-msg {
      color: #dc3545;
      margin-bottom: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-card text-center">
    <!-- Logo -->
    <img src="../assets/image/logo.png" alt="HAM Software Solutions" class="mb-3">

    <h3 class="mb-4">Admin Login</h3>

    <p class="error-msg" id="errorMsg"></p>

    <!-- LOGIN FORM -->
    <form id="adminLoginForm">
      <div class="mb-3 text-start">
        <label class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="admin@gmail.com"
          required
        />
      </div>

      <div class="mb-4 text-start">
        <label class="form-label">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary w-100 fw-bold">
        Login
      </button>
    </form>

    <p class="mt-3 text-muted" style="font-size: 14px;">
      © <span id="year"></span> HAM Software Solutions
    </p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Auto Year -->
  <script>
    document.getElementById("year").innerText = new Date().getFullYear();
  </script>

  <!-- Admin Login JS -->
  <script>
    const form = document.getElementById("adminLoginForm");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch("http://localhost:5000/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.style.display = "block";
          errorMsg.innerText = data.message || "Login failed!";
          return;
        }

        // Save token to localStorage
        localStorage.setItem("adminToken", data.token);

        // Redirect to dashboard
        window.location.href = "dashboard.html";

      } catch (err) {
        console.error(err);
        errorMsg.style.display = "block";
        errorMsg.innerText = "Server error. Please try again later.";
      }
    });
  </script>

</body>
</html>
